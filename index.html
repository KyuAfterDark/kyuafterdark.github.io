    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z02Y2MPX8D"></script>

    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }

      gtag("js", new Date());
      gtag("config", "G-Z02Y2MPX8D");

      function trackClick(linkName, linkUrl) {
        gtag("event", "outbound_click", {
          brand: "kyu_crush",
          link_name: linkName,
          link_url: linkUrl
        });
      }
    </script>

    <style>
      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      :root {
        --cream: #fff3d6;
        --vanilla: #ffe8a3;
        --peach: #ff9f7a;
        --bubblegum: #ff4fa3;
        --cherry: #ff3b5f;
        --sky: #72c7ff;
        --mint: #8ff0c6;
        --choco: #3a2418;
        --white: #fffaf0;
        --soft-shadow: rgba(58, 36, 24, 0.16);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 18% 10%, rgba(255, 232, 163, 0.95) 0%, transparent 27%),
          radial-gradient(circle at 88% 15%, rgba(255, 79, 163, 0.48) 0%, transparent 29%),
          radial-gradient(circle at 12% 82%, rgba(143, 240, 198, 0.52) 0%, transparent 32%),
          radial-gradient(circle at 80% 92%, rgba(114, 199, 255, 0.56) 0%, transparent 36%),
          linear-gradient(135deg, #fff3d6 0%, #ffd6e8 48%, #bde9ff 100%);
        color: var(--choco);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        overflow-x: hidden;
        padding: 20px 0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.60) 2px, transparent 3px);
        background-size: 34px 34px;
        opacity: 0.42;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        width: 360px;
        height: 360px;
        right: -120px;
        top: -120px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 79, 163, 0.24) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 430px;
        padding: 24px;
      }

      .card {
        background: rgba(255, 250, 240, 0.86);
        border: 2px solid rgba(255, 255, 255, 0.76);
        border-radius: 30px;
        padding: 30px 22px 24px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.46) inset,
          0 18px 44px rgba(255, 79, 163, 0.18),
          0 12px 30px rgba(58, 36, 24, 0.12);
        backdrop-filter: blur(13px);
        -webkit-backdrop-filter: blur(13px);
      }

      .profile {
        width: 124px;
        height: 124px;
        object-fit: cover;
        border-radius: 50%;
        display: block;
        margin: 0 auto 18px;
        border: 4px solid var(--white);
        box-shadow:
          0 0 0 5px rgba(255, 79, 163, 0.16),
          0 0 0 10px rgba(255, 232, 163, 0.30),
          0 14px 28px rgba(58, 36, 24, 0.18);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 42px;
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: -0.055em;
        color: var(--choco);
        text-shadow:
          2px 3px 0 rgba(255, 232, 163, 0.92),
          -1px -1px 0 rgba(255, 255, 255, 0.85);
      }

      .bio {
        margin: 0 auto 8px;
        color: rgba(58, 36, 24, 0.78);
        font-size: 15px;
        line-height: 1.45;
        font-weight: 700;
      }

      .trust {
        margin: 0 auto 22px;
        color: rgba(58, 36, 24, 0.54);
        font-size: 13px;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 340px;
        margin: 0 auto;
      }

      .btn {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 58px;
        padding: 17px 18px;
        border-radius: 20px;
        text-decoration: none;
        font-size: 17px;
        font-weight: 900;
        line-height: 1.2;
        letter-spacing: 0.01em;
        color: white;
        text-align: center;
        border: 2px solid rgba(255, 255, 255, 0.58);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.18) inset,
          0 10px 22px rgba(58, 36, 24, 0.16);
        transition:
          transform 0.18s ease,
          opacity 0.18s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease,
          background 0.22s ease;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.018);
        opacity: 1;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.22) inset,
          0 14px 26px rgba(58, 36, 24, 0.19);
      }

      .btn:active {
        transform: scale(0.985);
      }

      .btn:focus-visible {
        outline: 3px solid rgba(58, 36, 24, 0.90);
        outline-offset: 3px;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -110%;
        width: 42%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.42),
          transparent
        );
        transform: skewX(-20deg);
      }

      .btn:hover::before {
        left: 125%;
        transition: left 0.7s ease;
      }

      .btnText {
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 1.1;
      }

      .btnTitle {
        font-size: 17px;
        font-weight: 900;
      }

      .btnSub {
        margin-top: 4px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.07em;
        opacity: 0.78;
        text-transform: uppercase;
      }

      .mainProfile {
        background: linear-gradient(135deg, #ff4fa3, #ff3b5f);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.16) inset,
          0 0 30px rgba(255, 79, 163, 0.28),
          0 12px 24px rgba(58, 36, 24, 0.18);
      }

      .mainProfile:hover {
        transform: translateY(-2px) scale(1.03);
      }

      .instagram {
        background: linear-gradient(135deg, #ff9f7a, #ff4fa3);
      }

      .twitter {
        background: linear-gradient(135deg, #3a2418, #7a4a2a);
      }

      .telegram {
        background: linear-gradient(135deg, #72c7ff, #8ff0c6);
        color: var(--choco);
      }

      .footer {
        font-size: 12px;
        font-weight: 800;
        color: rgba(58, 36, 24, 0.46);
        margin-top: 20px;
      }

      @media (max-width: 480px) {
        body {
          align-items: flex-start;
        }

        .wrap {
          padding: 16px;
        }

        .card {
          padding: 26px 18px 20px;
          border-radius: 26px;
        }

        h1 {
          font-size: 36px;
        }

        .bio {
          font-size: 15px;
        }

        .btn {
          min-height: 60px;
          font-size: 16px;
          padding: 16px;
          border-radius: 18px;
        }

        .links {
          gap: 12px;
        }
      }
    </style>
  </head>

  <body>
    <main class="wrap">
      <section class="card">
        <img
          class="profile"
          src="https://raw.githubusercontent.com/YOUR_GITHUB_USER/YOUR_REPO/main/kyu-crush.png"

        <h1>Kyu Crush</h1>

        <p class="bio">🍒 Sweet looks. Loud energy. Good trouble.</p>

        <div class="links">
          <!-- Replace placeholder URLs with your real profile links before publishing. -->
          <a

            </span>
          </a>

          <a
            href="https://x.com/YOUR_NEW_HANDLE"
            class="btn twitter"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open X"
            onclick="trackClick('x', 'https://x.com/YOUR_NEW_HANDLE')"
          >
            <span class="btnText">
              <span class="btnTitle">X / Twitter 💬</span>
              <span class="btnSub">teasers & updates</span>
            </span>
          </a>

          <a
            href="https://t.me/YOUR_NEW_HANDLE"
            class="btn telegram"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Telegram"
            onclick="trackClick('telegram', 'https://t.me/YOUR_NEW_HANDLE')"
          >
            <span class="btnText">
              <span class="btnTitle">Telegram 🔒</span>
              <span class="btnSub">closer updates</span>
            </span>
          </a>
        </div>

        <p class="footer">Kyu Crush Hub</p>
      </section>
    </main>
  </body>
</html>
